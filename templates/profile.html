{% extends "base.html" %}
{% block content %}
<h1>Profil</h1>
<form method="post" action="{{ url_for('update_profile') }}" class="stack wide-form">
  <label>Benutzername
    <input value="{{ user['username'] }}" disabled>
  </label>
  <label>Anzeigename
    <input name="display_name" required value="{{ user['display_name'] }}">
  </label>
  <p>Passwort und Login werden in Tinyauth verwaltet.</p>
  <button type="submit">Profil speichern</button>
</form>
{% endblock %}
